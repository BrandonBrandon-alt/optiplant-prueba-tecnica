spring:
  application:
    name: optiplant-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/inventario_multisucursal}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    # Debe coincidir con DB_PASSWORD en .env
    password: ${SPRING_DATASOURCE_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'validate': JPA verifica que las entidades coincidan con el esquema.
      # Flyway es quien gestiona el DDL (CREATE TABLE, ALTER TABLE).
      # Esto evita conflictos entre Flyway y Hibernate.
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    # Flyway activo: aplica V1__init_schema.sql y V2__catalog_seed_data.sql al arrancar.
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS1mb3Itb3B0aXBsYW50LWFwaS10ZXN0}
    expiration: 86400000 # 1 day in ms

# VALOR AGREGADO: Logs específicos para ver nuestra arquitectura hexagonal en acción
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE # Muestra los valores reales insertados en los '?' del SQL
    co.com.optiplant.inventario: INFO # Muestra los logs de nuestros Casos de Uso
